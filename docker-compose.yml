# Local prod-like stack: PostgreSQL + Redis + the backend.
# Values come from a sibling `.env` (see .env.example); most defaults below let it
# boot out of the box for local testing. JWT_SECRET is deliberately NOT defaulted —
# generate one (`openssl rand -base64 32`) and put it in .env, so no deployment can
# ever run on a publicly known signing key. Schema is applied by Flyway at startup.
#
#   docker compose up --build
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: huevista
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Load every KEY=VALUE from the sibling .env directly into the container, so ANY
    # variable the backend reads can be set in .env without editing this file again.
    # The explicit `environment:` entries below still win where a fixed or compose-internal
    # value is needed (Redis host, JWT fail-fast, local-DB fallback).
    env_file:
      - .env
    environment:
      # Datasource — driven by .env (e.g. your RDS endpoint); falls back to the local
      # compose `postgres` service only when SPRING_DATASOURCE_URL is unset (local dev).
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/huevista}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Timestamps are zone-naive (LocalDateTime) — keep the JVM on IST everywhere
      # or every expiry shifts by the host's offset (see Dockerfile).
      TZ: ${TZ:-Asia/Kolkata}
      # Required — compose fails fast if missing rather than running on a known key.
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env — generate with: openssl rand -base64 32}"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-dev-disabled}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dev-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dev-google-client-secret}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Optional integrations — pass through if set in .env.
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      # Auto wall-segmentation mask model — opt-in, default off. Env var names
      # kept from the Nano Banana era; FLUX.2 [max] is the default model now.
      REPLICATE_NANO_BANANA_ENABLED: ${REPLICATE_NANO_BANANA_ENABLED:-false}
      REPLICATE_NANO_BANANA_MODEL: ${REPLICATE_NANO_BANANA_MODEL:-black-forest-labs/flux-2-max}
      # Image cleaner (declutter + refresh paint before masking) — opt-in, default off.
      # Defaults to Gemini 3 Pro Image (google/nano-banana-pro); ~$0.10 per clean on Replicate.
      REPLICATE_IMAGE_CLEANER_ENABLED: ${REPLICATE_IMAGE_CLEANER_ENABLED:-false}
      REPLICATE_IMAGE_CLEANER_MODEL: ${REPLICATE_IMAGE_CLEANER_MODEL:-google/nano-banana-pro}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-}
      SMS_ENABLED: ${SMS_ENABLED:-false}
    ports:
      - "8080:8080"
    healthcheck:
      # Mirrors the image's own HEALTHCHECK; start_period covers JVM boot +
      # Flyway migrations on first run.
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  pgdata:
