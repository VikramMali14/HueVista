# Local prod-like stack: PostgreSQL + Redis + the backend.
# Values come from a sibling `.env` (see .env.example); the defaults below let it
# boot out of the box for local testing. Schema is auto-created (ddl-auto=update).
#
#   docker compose up --build
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: huevista
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Datasource — point at the postgres service.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/huevista
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Required placeholders (override in .env for real use).
      JWT_SECRET: ${JWT_SECRET:-ZGV2LW9ubHktc2VjcmV0LWtleS1jaGFuZ2UtbWUtMzJieXRlcyE=}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-dev-disabled}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dev-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dev-google-client-secret}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Optional integrations — pass through if set in .env.
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-}
      SMS_ENABLED: ${SMS_ENABLED:-false}
    ports:
      - "8080:8080"

volumes:
  pgdata:
