# HueVista - Application Configuration
# Replace all CHANGEME values before running / deploying.

spring.application.name=HueVista

# --- Server ---
server.port=8080

# --- PostgreSQL Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/huevista
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# update   -> auto-creates / alters tables on startup (dev only)
# validate -> only validates schema matches entities (prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
# Secret must be a Base64-encoded string of at least 256 bits (32 bytes).
# Generate with: openssl rand -base64 32
app.jwt.secret=${JWT_SECRET}
# Access token lifetime: 15 minutes (900 000 ms)
app.jwt.expiration-ms=900000

# --- Refresh Token ---
# 7 days (604 800 000 ms)
app.refresh-token.expiration-ms=604800000

# --- Google OAuth2 ---
# Create credentials at: https://console.cloud.google.com/apis/credentials
# Authorized redirect URI to add: http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# --- File Upload ---
# Max single file: 10 MB | Max whole request: 11 MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
# Local storage path (override with env var; swap to S3 later)
app.upload.storage-path=${UPLOAD_PATH:/tmp/huevista/uploads}

# --- AWS S3 Storage ---
# Set S3_BUCKET_NAME env var (or override app.s3.bucket-name) to activate S3.
# Leave blank (default) to use local filesystem storage.
app.s3.bucket-name=${S3_BUCKET_NAME:}
app.s3.region=${S3_REGION:ap-south-1}
# app.s3.access-key=${AWS_ACCESS_KEY_ID:}        # leave blank to use IAM role
# app.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}    # leave blank to use IAM role
# app.s3.presigned-url-expiry-minutes=60

# --- Claude API ---
# API key from https://console.anthropic.com/
app.claude.api-key=${ANTHROPIC_API_KEY}
# Model used for image classification (ImageController)
app.claude.model=claude-haiku-4-5-20251001
# Model used for shade enrichment at seed time (ShadeEnrichmentService)
# Haiku is sufficient — structured JSON output, no vision needed
app.claude.enrichment-model=claude-haiku-4-5-20251001
# Model used for AI color recommendations (requires vision + reasoning)
app.claude.recommendation-model=claude-sonnet-4-6
# Model used by WallSceneAnalyzer to return per-surface coordinates for the
# SAM 2 auto-segmentation pipeline. Sonnet because spatial coordinate output
# is the hardest task for vision models — Haiku consistently mislocates
# points by 10–15%, enough to send SAM 2 off the intended wall.
app.claude.scene-analysis-model=${CLAUDE_SCENE_MODEL:claude-sonnet-4-6}

# --- Springdoc / Swagger UI ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.api-docs.path=/v3/api-docs

# --- Replicate API (SAM 2 segmentation) ---
# Get your token at https://replicate.com/account/api-tokens
replicate.api-token=${REPLICATE_API_TOKEN:}
# SAM 2 model version hash from https://replicate.com/meta/sam-2
replicate.sam2.model-version=${REPLICATE_SAM2_VERSION:}
# Non-paintable surface detection. When true, a second grounded_sam call
# specifically hunts for stone cladding, exposed brick, ceramic tile, marble,
# wallpaper, wood paneling, and vinyl/metal siding. Its mask is subtracted
# from the wall mask in pixel space — so the user can't paint over a stone
# column or a tiled backsplash.
#
# DEFAULT IS FALSE: in initial testing on real photographs the non-paintable
# detector over-matched (cream painted plaster was being flagged as "marble"
# or "stone wall"), and the subtraction wiped the actual wall. Re-enable
# only after tuning the prompt list for your photo distribution. Adds ~5-8s
# of Replicate latency and ~$0.005 per upload when on.
replicate.grounded-sam.detect-non-paintable=${DETECT_NON_PAINTABLE:false}

# Wall scene analysis (Claude Haiku Vision pre-pass). When true, the image is
# sent to Claude Haiku before Grounded SAM to (a) reject non-paintable surfaces
# (brick, tile, marble, wallpaper) early and (b) generate an image-specific
# negative_mask_prompt covering exactly the objects in that photo. Falls back
# to the static INDOOR/OUTDOOR lists if Claude fails. Adds ~1.5s latency and
# ~$0.001/image on Haiku. Disable to save cost during development.
app.segmentation.scene-analysis.enabled=${SCENE_ANALYSIS_ENABLED:true}

# Grounded SAM (wall auto-detection). REQUIRED for /api/projects/{id}/segment
# to work — Replicate's /models/{slug}/predictions shortcut only resolves for
# Meta's official models, so third-party models like schananas/grounded_sam
# MUST be called via /predictions with a pinned version hash. Without
# REPLICATE_GROUNDED_SAM_VERSION set, auto-segmentation marks projects FAILED
# with a message telling the user to either configure this or click-segment.
#
# To set: open https://replicate.com/schananas/grounded_sam/versions, copy
# the most recent hash, and set REPLICATE_GROUNDED_SAM_VERSION=<hash>.
# Click-to-segment continues to work without this (it uses SAM 2 directly).
replicate.grounded-sam.model=${REPLICATE_GROUNDED_SAM_MODEL:schananas/grounded_sam}
replicate.grounded-sam.model-version=${REPLICATE_GROUNDED_SAM_VERSION:}

# === ADE20K SEMANTIC SEGMENTATION (PRIMARY pipeline when configured) ===
#
# A Mask2Former / OneFormer / SegFormer model trained on ADE20K's 150 scene
# classes. Knows every pixel's semantic class — "wall", "windowpane", "door",
# "sky", "grass", "ceiling", etc. — so we can identify paintable wall
# surfaces directly instead of asking SAM/Claude to guess. When this is
# configured, segmentAsync tries it FIRST; SAM/Claude only runs as a
# fallback if the model isn't configured or fails.
#
# NOTE: meta/mask2former on Replicate was DISABLED by Meta in late 2025.
# Use one of the third-party alternatives below instead.
#
# To enable:
#  1. Open https://replicate.com/explore?query=ade20k and pick an active
#     ADE20K model. Currently-active candidates as of 2026:
#       - cjwbw/semantic-segment-anything   (SAM + ADE20K classifier)
#       - cjwbw/oneformer                   (OneFormer trained on ADE20K)
#     Other meta/mask2former-style models come and go on Replicate; check
#     the model's "Status" badge before relying on it.
#  2. Pin a version: open the model's Versions tab, copy the latest hash.
#  3. Set REPLICATE_ADE20K_MODEL and REPLICATE_ADE20K_VERSION env vars.
#
# Leave the model blank to disable (segmentation falls back to SAM 2
# + Claude pipeline). Add ~5-10s latency and ~$0.005-0.02 per call when on.
#
# RECOMMENDED: skip this path entirely and use the Gemini Image path
# below instead. Gemini handles paint-mask generation more reliably
# than any current Replicate ADE20K model and doesn't depend on a
# third-party Replicate publisher keeping their model online.
replicate.ade20k.model=${REPLICATE_ADE20K_MODEL:}
replicate.ade20k.model-version=${REPLICATE_ADE20K_VERSION:}
replicate.ade20k.enabled=${REPLICATE_ADE20K_ENABLED:true}

# === GEMINI IMAGE / NANO BANANA 2 (highest-priority primary path) ===
#
# When configured, segmentAsync sends the photo to Gemini and asks for a
# per-category binary mask image (one Gemini call per category: main wall,
# accent wall, trim). Saves whichever masks come back at usable size.
# Falls through to ADE20K, then to SAM/Claude, if Gemini isn't configured
# or fails.
#
# Honest caveat: this is image GENERATION rather than pixel extraction.
# Gemini may misalign mask boundaries by a few pixels. Recent versions
# (Gemini 3 Pro Image = "Nano Banana 2") are much better at pixel-aligned
# edits than earlier diffusion models, but it's still worth testing on
# your photo distribution and comparing to the ADE20K path.
#
# Cost: ~$0.04 per mask × up to 3 categories per upload = ~$0.12/upload.
# User explicitly asked to prioritize result quality over cost.
google.gemini.api-key=${GEMINI_API_KEY:}
google.gemini.image-model=${GEMINI_IMAGE_MODEL:gemini-3-pro-image-preview}
google.gemini.image.enabled=${GEMINI_IMAGE_ENABLED:true}

# === NANO BANANA via REPLICATE (preferred Nano Banana path) ===
#
# Google publishes Nano Banana on Replicate. Using it via Replicate
# means you reuse your existing REPLICATE_API_TOKEN — no separate
# Google AI Studio key needed. RECOMMENDED if you're already paying
# for Replicate anyway.
#
# Available variants on Replicate:
#   google/nano-banana-2     Gemini 3.1 Flash Image (DEFAULT, ~$0.04/mask)
#   google/nano-banana-pro   Gemini 3 Pro Image     (highest quality, ~$0.10/mask)
#   google/nano-banana       Gemini 2.5 Flash Image (cheapest, ~$0.02/mask)
#
# To enable:
#  1. Set REPLICATE_NANO_BANANA_ENABLED=true
#  2. Optionally set REPLICATE_NANO_BANANA_MODEL=google/nano-banana-pro
#     (the default is google/nano-banana-2)
#  3. VERSION IS NOT REQUIRED for google/* models. They are official
#     Replicate-managed models (like meta/sam-2) and resolve via the
#     /models/{slug}/predictions shortcut. The "Versions" tab is hidden
#     on these model pages because Replicate manages versioning for you.
#     Leave REPLICATE_NANO_BANANA_VERSION unset.
#
# When ENABLED is false (default), the SAM/Claude pipeline runs as before.
replicate.nano-banana.enabled=${REPLICATE_NANO_BANANA_ENABLED:false}
replicate.nano-banana.model=${REPLICATE_NANO_BANANA_MODEL:google/nano-banana-2}
replicate.nano-banana.model-version=${REPLICATE_NANO_BANANA_VERSION:}

# === IMAGE CLEANER (optional preprocessing step) ===
#
# When enabled, runs a Nano Banana Pro call BEFORE mask generation to
# remove visual clutter (overhead wires, bushes covering walls, parked
# cars, garbage, hanging laundry, scaffolding, people) while keeping
# the architecture intact. The cleaned image then becomes both:
#   1. The canvas the frontend paints on (preview shows cleaned house)
#   2. The input to mask generation, so masks align to the cleaned house
#
# Tradeoff (must read before enabling): this is GENERATIVE editing.
# The model regenerates the photo with hallucinations. Architecture,
# proportions, materials are mostly preserved but you should expect
# subtle drift — wall textures smoothed, fine details slightly altered,
# possibly the cream paint shade interpreted differently. Some
# customers may say "that's not exactly my house". Your README explicitly
# warned against this trade-off for the core engine; we expose it as
# opt-in only.
#
# Cost: ~$0.10 per upload on Nano Banana Pro. Doubles per-upload Replicate
# spend (clean + mask = 2 calls). Add ~5-10s latency.
replicate.image-cleaner.enabled=${REPLICATE_IMAGE_CLEANER_ENABLED:false}
replicate.image-cleaner.model=${REPLICATE_IMAGE_CLEANER_MODEL:google/nano-banana-pro}
# Set false to skip the second (trim/baseboards/frames) Grounded SAM call —
# halves Replicate cost per upload at the price of no auto-detected trim.
replicate.grounded-sam.detect-trim=${REPLICATE_DETECT_TRIM:true}

# --- Base URL (used for share link generation) ---
app.base-url=${APP_BASE_URL:http://localhost:8080}

# --- CORS ---
# Comma-separated list of allowed frontend origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# --- Razorpay ---
# API keys from https://dashboard.razorpay.com/app/keys
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
# Webhook secret set in Razorpay dashboard → Webhooks
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}
# Razorpay Plan IDs (create plans in dashboard, paste IDs here)
razorpay.plan.starter=${RAZORPAY_PLAN_STARTER:}
razorpay.plan.professional=${RAZORPAY_PLAN_PROFESSIONAL:}
razorpay.plan.business=${RAZORPAY_PLAN_BUSINESS:}

# --- Redis ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
# Cache TTLs
app.cache.shade-ttl-minutes=60

# --- Logging ---
logging.level.com.gridstore.huevista=DEBUG
logging.level.org.springframework.security=INFO

# Log file - saved to logs/huevista.log in the project directory
logging.file.name=logs/huevista.log
# Keep last 10 log files, max 10MB each
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10
