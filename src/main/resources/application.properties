# HueVista - Application Configuration
# Replace all CHANGEME values before running / deploying.

spring.application.name=HueVista

# --- Server ---
server.port=8080

# --- Load management: HTTP connector limits ---
# Cap concurrent worker threads and the accept backlog so a traffic spike sheds
# load (connections queue / are refused) instead of exhausting memory/CPU and
# taking the whole instance down. Tune per instance size.
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:200}
server.tomcat.threads.min-spare=${TOMCAT_MIN_SPARE_THREADS:10}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:8192}
# Drop slow/stalled clients (Slowloris) rather than holding a worker thread.
server.tomcat.connection-timeout=${TOMCAT_CONNECTION_TIMEOUT:20s}
# Hard cap on request header + any swallowed body size (defence-in-depth vs huge requests).
server.tomcat.max-http-form-post-size=${TOMCAT_MAX_FORM_POST:12MB}
server.tomcat.max-swallow-size=${TOMCAT_MAX_SWALLOW:12MB}
# Graceful shutdown: let in-flight requests finish before the process exits.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_GRACE:25s}

# --- PostgreSQL Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/huevista
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Connection pool (HikariCP) — load management ---
# Bound DB connections so request spikes wait briefly for a connection instead of
# opening unbounded connections and overwhelming Postgres. connection-timeout caps
# how long a thread blocks waiting for a free connection before failing fast.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}

# --- Schema migrations (Flyway) ---
# The schema is owned by versioned SQL in src/main/resources/db/migration, applied
# automatically at startup. baseline-on-migrate handles databases that predate
# Flyway (created by the old ddl-auto=update): a non-empty schema is stamped as
# already at V1 (the baseline) and only V2+ are applied; a fresh empty database
# gets V1 and everything after it.
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# --- JPA / Hibernate ---
# validate -> Hibernate only checks the schema matches the entities; it never
#             mutates it (Flyway owns all DDL). Override with SPRING_JPA_DDL_AUTO
#             only for throwaway environments.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
# Secret must be a Base64-encoded string of at least 256 bits (32 bytes).
# Generate with: openssl rand -base64 32
app.jwt.secret=${JWT_SECRET}
# Access token lifetime: 15 minutes (900 000 ms)
app.jwt.expiration-ms=900000

# --- Refresh Token ---
# 7 days (604 800 000 ms)
app.refresh-token.expiration-ms=604800000
# Rotation reuse grace window: a just-rotated refresh token is still honoured for
# this long, so parallel tabs/requests racing the same refresh don't log the user
# out. Reuse AFTER the window is treated as token theft and revokes all sessions.
app.refresh-token.reuse-grace-ms=${REFRESH_REUSE_GRACE_MS:60000}

# --- Google OAuth2 ---
# Create credentials at: https://console.cloud.google.com/apis/credentials
# Authorized redirect URI to add: http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# --- File Upload ---
# Max single file: 10 MB | Max whole request: 11 MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
# Local storage path (override with env var; swap to S3 later)
app.upload.storage-path=${UPLOAD_PATH:/tmp/huevista/uploads}

# --- AWS S3 Storage ---
# Set S3_BUCKET_NAME env var (or override app.s3.bucket-name) to activate S3.
# Leave blank (default) to use local filesystem storage.
app.s3.bucket-name=${S3_BUCKET_NAME:}
app.s3.region=${S3_REGION:ap-south-1}
# app.s3.access-key=${AWS_ACCESS_KEY_ID:}        # leave blank to use IAM role
# app.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}    # leave blank to use IAM role
# app.s3.presigned-url-expiry-minutes=60

# --- Claude API ---
# API key from https://console.anthropic.com/
app.claude.api-key=${ANTHROPIC_API_KEY}
# Model used for image classification (ImageController)
app.claude.model=claude-haiku-4-5-20251001
# Model used for shade enrichment at seed time (ShadeEnrichmentService)
# Haiku is sufficient — structured JSON output, no vision needed
app.claude.enrichment-model=claude-haiku-4-5-20251001
# Model used for AI color recommendations (requires vision + reasoning)
app.claude.recommendation-model=claude-sonnet-4-6

# --- Springdoc / Swagger UI ---
# Swagger UI + the OpenAPI spec are PUBLIC (permitAll). They expose the full API
# surface, so they are OFF unless explicitly enabled: set SWAGGER_ENABLED=true in
# dev environments that want the UI (turns on both the UI and /v3/api-docs).
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.api-docs.path=/v3/api-docs

# === Replicate API (auto-segmentation + click-to-segment) ===
#
# Pipeline (top to bottom; later steps only used by manual click flow):
#   1. ImageCleanerService   (opt-in) — Nano Banana Pro removes clutter
#                            and refreshes painted surfaces in the same
#                            color, giving a clean canvas for masks.
#   2. ReplicateMaskSegmenter — single image-edit call (FLUX.2 [max] by
#                            default) returns a color-coded mask
#                            (red=main wall, green=accent, blue=trim).
#                            Server splits into per-category binary masks.
#   3. SAM 2 (meta/sam-2)    — used only by the manual click-to-segment
#                            endpoint. Auto pipeline does NOT use SAM 2
#                            any more (was the old approach).
#
# Get a Replicate token at https://replicate.com/account/api-tokens
replicate.api-token=${REPLICATE_API_TOKEN:}

# SAM 2 model version hash (manual click-to-segment only). Optional —
# when blank, calls /models/meta/sam-2/predictions which always uses
# the latest published version.
replicate.sam2.model-version=${REPLICATE_SAM2_VERSION:}

# Auto mask generation model (ReplicateMaskSegmenter). Reuses your
# REPLICATE_API_TOKEN. Key/env-var names still say "nano-banana" for
# backwards compatibility with existing deployments — the value decides
# which model actually runs.
#
# Supported models on Replicate (no version pin required — Replicate
# manages versioning for you):
#   black-forest-labs/flux-2-max  FLUX.2 [max]      (DEFAULT — highest editing
#                                 consistency; supports aspect_ratio
#                                 "match_input_image" so the mask keeps the
#                                 photo's exact aspect)
#   black-forest-labs/flux-2-pro  FLUX.2 [pro]      (cheaper FLUX tier)
#   google/nano-banana-pro        Gemini 3 Pro Image (previous default,
#                                 ~$0.10/mask)
#   google/nano-banana-2          Gemini 3.1 Flash Image (faster/cheaper)
#
# To enable: REPLICATE_NANO_BANANA_ENABLED=true. When false,
# auto-segmentation fails clearly and the UI falls back to click-segment.
# NOTE: if REPLICATE_NANO_BANANA_MODEL is set in your deployment env it
# overrides this default — unset it (or set it to
# black-forest-labs/flux-2-max) to get the FLUX.2 [max] masks.
replicate.nano-banana.enabled=${REPLICATE_NANO_BANANA_ENABLED:false}
replicate.nano-banana.model=${REPLICATE_NANO_BANANA_MODEL:black-forest-labs/flux-2-max}
replicate.nano-banana.model-version=${REPLICATE_NANO_BANANA_VERSION:}
# Mask output resolution, in Nano Banana units (1K/2K/4K). For FLUX models the
# value is translated to megapixels automatically (2K → "2 MP"); FLUX also
# accepts "match_input_image" here to mirror the photo's own resolution
# (clamped to 0.5–4 MP). 2K keeps surface boundaries crisp when the mask is
# stretched over the studio's large canvas; the request automatically retries
# without this key on models that don't support it.
replicate.nano-banana.resolution=${REPLICATE_NANO_BANANA_RESOLUTION:2K}

# Image cleaner (preprocessing). Runs Nano Banana Pro on the photo BEFORE
# mask generation to remove visual clutter (wires, bushes, parked cars,
# garbage, hanging laundry, scaffolding, people) AND repaint the painted
# surfaces into the reference palette. The cleaned image becomes both the
# paint-preview canvas and the mask-generation input.
#
# Tradeoff: this is generative editing. The model regenerates the photo
# with some drift (textures smoothed, fine details slightly altered).
# On by default; set this to false to skip it. The original image always
# stays in S3 untouched so the frontend can fall back.
#
# Cost: ~$0.10 per upload on Nano Banana Pro. Doubles per-upload
# Replicate spend (clean + mask = 2 calls). Adds ~5-10s latency.
replicate.image-cleaner.enabled=true
replicate.image-cleaner.model=${REPLICATE_IMAGE_CLEANER_MODEL:google/nano-banana-pro}
# Generation resolution requested from the model (Nano Banana Pro accepts 1K/2K/4K).
# Generating at 1K is cheaper/faster; we then upscale the result locally (below).
# Leave blank to let the model pick its own default / for models without the param.
replicate.image-cleaner.resolution=${REPLICATE_IMAGE_CLEANER_RESOLUTION:1K}
# After download, upscale the cleaned image to this longest-edge size (px) with a
# local Java resampler (Thumbnailator) — 3840 ≈ 4K. Set 0 to keep the model output as-is.
replicate.image-cleaner.upscale-longest-px=${REPLICATE_IMAGE_CLEANER_UPSCALE_PX:3840}

# --- Base URL (used for share link generation) ---
app.base-url=${APP_BASE_URL:http://localhost:8080}

# --- CORS ---
# Comma-separated list of allowed frontend origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# --- Admin bootstrap ---
# On startup, seed a single ROLE_ADMIN with these credentials IF both are set and no
# such account exists. Leave blank to skip. Keep the password OUT of source — set it
# via the ADMIN_PASSWORD env var / your secrets store, never commit it.
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}

# --- Razorpay ---
# API keys from https://dashboard.razorpay.com/app/keys
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
# Webhook secret set in Razorpay dashboard → Webhooks
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}
# Razorpay Plan IDs (create plans in dashboard, paste IDs here).
# IMPORTANT: configure each dashboard plan with the GST-INCLUSIVE monthly amount —
# base price + 18% GST (see Plan.java):
#   Starter       Rs.   999 + GST -> 117882 paise (Rs. 1,178.82)
#   Professional  Rs. 2,499 + GST -> 294882 paise (Rs. 2,948.82)
#   Business      Rs. 4,999 + GST -> 589882 paise (Rs. 5,898.82)
razorpay.plan.starter=${RAZORPAY_PLAN_STARTER:}
razorpay.plan.professional=${RAZORPAY_PLAN_PROFESSIONAL:}
razorpay.plan.business=${RAZORPAY_PLAN_BUSINESS:}

# --- One-time "extra project" purchase (customer buys a single project credit) ---
# Price a customer pays to unlock one more project beyond their included one.
app.project-credit.amount-paise=${PROJECT_CREDIT_AMOUNT_PAISE:4900}
app.project-credit.currency=${PROJECT_CREDIT_CURRENCY:INR}

# --- Pay-per-image overage (retailer buys one extra image after the monthly quota) ---
# Rs. 50 base + 18% GST = Rs. 59. Must track Plan.IMAGE_OVERAGE_PRICE_PAISE.
app.image-credit.amount-paise=${IMAGE_CREDIT_AMOUNT_PAISE:5900}
app.image-credit.currency=${IMAGE_CREDIT_CURRENCY:INR}

# --- Prepaid billing wallet (top up once, spend on extra images / auto-masks) ---
app.wallet.min-topup-paise=${WALLET_MIN_TOPUP_PAISE:10000}
app.wallet.max-topup-paise=${WALLET_MAX_TOPUP_PAISE:10000000}
app.wallet.currency=${WALLET_CURRENCY:INR}

# --- In-store kiosk (public store links + retailer wallet) ---
# The platform base kept from every kiosk payment; also the floor for the price
# a retailer may set on their store link. Anything above it accrues to the
# retailer's wallet.
app.store.min-price-paise=${STORE_MIN_PRICE_PAISE:5000}
app.store.currency=${STORE_CURRENCY:INR}
# Smallest wallet payout a retailer may request.
app.store.min-redemption-paise=${STORE_MIN_REDEMPTION_PAISE:5000}
# Where payout requests are mailed for the manual admin review.
app.store.redemption-email=${STORE_REDEMPTION_EMAIL:redemeamount@huevista.org}
# Public kiosk order/verify per-IP throttle (one shop's customers share the kiosk IP).
app.rate-limit.store-order.max-attempts=${RATE_LIMIT_STORE_ORDER_MAX:60}
app.rate-limit.store-order.window-seconds=${RATE_LIMIT_STORE_ORDER_WINDOW:3600}

# --- Email + Mobile verification (6-digit OTP) ---
# Senders are pluggable: when app.mail.enabled=true AND spring.mail.host is set,
# real e-mails go out; otherwise the code is logged to the server console (dev).
# For SMS, set app.sms.enabled=true + app.sms.provider=<name> and wire a provider
# in SmsSender (default "console" just logs). All blank/false-safe by default.
#
# IMPORTANT: these flags also drive the retailer verification gate
# (ProjectAccessPolicy). A retailer must verify a channel before creating projects
# ONLY when that channel is enabled here — requiring a phone OTP that can never be
# delivered (sms disabled) would hard-block every retailer. Production should set
# MAIL_ENABLED=true and SMS_ENABLED=true to get the full email+mobile gate.
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@huevista.app}
# Payment / subscription receipts are sent from this address (must be sendable by
# the SMTP account above — keep it on the same authenticated domain).
app.mail.billing-from=${MAIL_BILLING_FROM:payments@huevista.org}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.sms.enabled=${SMS_ENABLED:false}
app.sms.provider=${SMS_PROVIDER:console}
# Twilio (used when app.sms.provider=twilio). Creds: https://console.twilio.com
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
# Sender phone number or Messaging Service SID, E.164 format (e.g. +14155552671).
twilio.from-number=${TWILIO_FROM_NUMBER:}

# --- Redis ---
# Redis is used for caching + the segmentation job queue via RedisTemplate, NOT as a
# Spring Data repository store — disable repo scanning so all JpaRepository interfaces
# (e.g. AuditLogRepository) are unambiguously claimed by JPA.
spring.data.redis.repositories.enabled=false
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
# Cache TTLs
app.cache.shade-ttl-minutes=60

# --- Load management: async AI executor + segmentation queue ---
# Bounds the pool that runs AI/segmentation work off the request thread. When the
# queue fills, new work runs on the caller (CallerRunsPolicy) as backpressure
# rather than being dropped — see AsyncConfig.
app.async.core-pool-size=${AI_EXECUTOR_CORE:4}
app.async.max-pool-size=${AI_EXECUTOR_MAX:16}
app.async.queue-capacity=${AI_EXECUTOR_QUEUE:100}
# Reject new segmentation enqueues once the Redis backlog reaches this depth, so a
# burst of uploads returns 503 (try later) instead of growing the queue without limit.
app.segmentation.queue.max-depth=${SEGMENTATION_QUEUE_MAX:500}

# --- Rate limiting (per-IP, Redis-backed, fail-open if Redis is down) ---
# Master switch for ALL per-IP limiters (signup + the sensitive-endpoint filter).
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
# Whether the limiters may trust X-Forwarded-For / X-Real-IP for the client IP.
# Keep true ONLY while the backend is reachable exclusively through our own
# frontend/proxy (which sets the header). If the backend port is exposed directly,
# set false — otherwise callers can spoof the header to bypass every per-IP limit.
app.rate-limit.trust-forwarded-headers=${RATE_LIMIT_TRUST_FORWARDED:true}
# How many proxies in front of this backend append to X-Forwarded-For (trust
# counts from the RIGHT of the header — the leftmost entries are whatever the
# client typed). 1 = the Next.js frontend, which normalises the header itself.
app.rate-limit.trusted-proxy-hops=${RATE_LIMIT_TRUSTED_PROXY_HOPS:1}
# Signup (account creation) — the original abuse target.
app.rate-limit.signup.max-attempts=${RATE_LIMIT_SIGNUP_MAX:10}
app.rate-limit.signup.window-seconds=${RATE_LIMIT_SIGNUP_WINDOW:3600}
# Login — caps credential stuffing / password spraying per IP (per-account lockout
# also applies independently in AuthService).
app.rate-limit.login.max-attempts=${RATE_LIMIT_LOGIN_MAX:15}
app.rate-limit.login.window-seconds=${RATE_LIMIT_LOGIN_WINDOW:300}
# Token refresh.
app.rate-limit.refresh.max-attempts=${RATE_LIMIT_REFRESH_MAX:60}
app.rate-limit.refresh.window-seconds=${RATE_LIMIT_REFRESH_WINDOW:300}
# Password reset request + confirm — anti reset-email bomb + 6-digit OTP brute force.
app.rate-limit.password-reset.max-attempts=${RATE_LIMIT_PWRESET_MAX:8}
app.rate-limit.password-reset.window-seconds=${RATE_LIMIT_PWRESET_WINDOW:900}
# Email/SMS verification code SEND — anti message-bomb (each send costs money).
app.rate-limit.otp-send.max-attempts=${RATE_LIMIT_OTP_SEND_MAX:6}
app.rate-limit.otp-send.window-seconds=${RATE_LIMIT_OTP_SEND_WINDOW:900}
# Email/SMS verification code CONFIRM — 6-digit code brute force defence.
app.rate-limit.otp-confirm.max-attempts=${RATE_LIMIT_OTP_CONFIRM_MAX:12}
app.rate-limit.otp-confirm.window-seconds=${RATE_LIMIT_OTP_CONFIRM_WINDOW:900}
# Access-code redeem (incl. public guest redeem) — 8-char code brute force / griefing.
app.rate-limit.code-redeem.max-attempts=${RATE_LIMIT_CODE_REDEEM_MAX:12}
app.rate-limit.code-redeem.window-seconds=${RATE_LIMIT_CODE_REDEEM_WINDOW:900}
# Image upload (user + guest) — every authenticated upload triggers a paid Claude
# Vision classification that is NOT quota-charged, so cap the per-IP burn rate.
app.rate-limit.image-upload.max-attempts=${RATE_LIMIT_IMAGE_UPLOAD_MAX:30}
app.rate-limit.image-upload.window-seconds=${RATE_LIMIT_IMAGE_UPLOAD_WINDOW:3600}
# Shop-account request form (public write) — anti-spam.
app.rate-limit.lead.max-attempts=${RATE_LIMIT_LEAD_MAX:5}
app.rate-limit.lead.window-seconds=${RATE_LIMIT_LEAD_WINDOW:3600}

# --- Support channels (all OPTIONAL — blank = that channel is disabled) ---
# Support AI agent model (falls back to the recommendation model).
app.claude.support-model=${SUPPORT_MODEL:claude-sonnet-4-6}
# A chat with no new message for this many hours is auto-closed (marked resolved),
# so a returning customer starts a fresh thread instead of a stale one. 0 disables.
app.support.idle-auto-close-hours=${SUPPORT_IDLE_AUTO_CLOSE_HOURS:24}
# WhatsApp Cloud API (Meta): a phone number id + permanent access token, plus a
# webhook verify token you choose. Webhook URL: {public-base}/api/support/webhooks/whatsapp
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:}
# Meta App Secret — verifies the X-Hub-Signature-256 on inbound webhooks (blank = skip).
whatsapp.app-secret=${WHATSAPP_APP_SECRET:}
whatsapp.api-base=${WHATSAPP_API_BASE:https://graph.facebook.com/v21.0}
# ElevenLabs Conversational AI (voice). Configure the agent's server tool +
# post-call webhook to {public-base}/api/support/webhooks/elevenlabs/{tool,post-call}
elevenlabs.api-key=${ELEVENLABS_API_KEY:}
elevenlabs.webhook-secret=${ELEVENLABS_WEBHOOK_SECRET:}

# --- Actuator (health by default; opt-in Prometheus metrics) ---
# /actuator/health is public (permitAll in SecurityConfig) so load balancers and
# container healthchecks can probe it. Details (which component is down) stay
# hidden from anonymous callers.
#
# Monitoring: set ACTUATOR_EXPOSURE=health,prometheus AND METRICS_PUBLIC=true to
# serve Prometheus metrics (JVM, HTTP latencies/status codes, Hikari pool, cache)
# at /actuator/prometheus. METRICS_PUBLIC makes that endpoint anonymous — only
# enable it when the backend port is reachable solely from your private network /
# scraper, never on a host exposed directly to the internet.
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSURE:health}
management.endpoint.health.show-details=never
# Kubernetes-style liveness/readiness groups at /actuator/health/{liveness,readiness}.
management.endpoint.health.probes.enabled=true
app.metrics.public=${METRICS_PUBLIC:false}

# --- Logging ---
# Default to INFO in production: DEBUG logs include user emails, storage keys and
# request paths (see JwtAuthFilter / GuestAuthFilter debug lines). The dev profile
# raises this back to DEBUG. Override per-env with LOG_LEVEL_APP.
logging.level.com.gridstore.huevista=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}

# Log file - saved to logs/huevista.log in the project directory by default.
# Override with LOG_FILE to point at an absolute, writable path per environment
# (the Docker image pre-creates /app/logs owned by the non-root runtime user).
logging.file.name=${LOG_FILE:logs/huevista.log}
# Keep last 10 log files, max 10MB each
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10
