# ============================================================================
#  HueVista — DEV profile  (run with:  -Dspring-boot.run.profiles=dev)
# ----------------------------------------------------------------------------
#  Goal: boot the whole backend with ZERO external infrastructure and ZERO
#  secrets. Overrides every ${ENV} placeholder from application.properties with
#  a safe local default so `mvnw spring-boot:run -Dspring-boot.run.profiles=dev`
#  just works.
#
#  What works in this profile:   register / login / refresh / profile, image
#                                upload (classified UNKNOWN — no Claude key),
#                                project create / regions / autosave, catalogue.
#  What is intentionally OFF:     S3 (uses local disk), Replicate auto-segment
#                                (fails over to "click-to-segment"), Razorpay,
#                                real Google OAuth, real Claude calls.
#  Segmentation note:            the async queue uses Redis. Either run Redis
#                                (see docker-compose.yml) or expect auto-segment
#                                to fail gracefully. Everything else is fine
#                                without Redis.
# ============================================================================

# --- In-memory / on-disk H2 (no PostgreSQL needed) ---
# File-based so your data survives a restart; delete ./data to reset.
spring.datasource.url=jdbc:h2:file:./data/huevista-dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console at http://localhost:8080/h2-console  (JDBC URL above, user "sa", no password)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JWT (dev-only secret — DO NOT use in production) ---
app.jwt.secret=ZGV2LW9ubHktc2VjcmV0LWtleS1jaGFuZ2UtbWUtMzJieXRlcyE=
app.jwt.expiration-ms=900000
app.refresh-token.expiration-ms=604800000

# --- Google OAuth (dummy so the app boots; real Google login won't work in dev) ---
spring.security.oauth2.client.registration.google.client-id=dev-google-client-id
spring.security.oauth2.client.registration.google.client-secret=dev-google-client-secret

# --- Claude API (no real key — ImageService falls back to UNKNOWN classification) ---
app.claude.api-key=dev-disabled

# --- Storage: local filesystem (S3 disabled because bucket name is blank) ---
app.s3.bucket-name=
app.upload.storage-path=./data/uploads

# --- External AI (Replicate) disabled: auto-segmentation will fail over to click-to-segment ---
replicate.api-token=
replicate.nano-banana.enabled=false
replicate.image-cleaner.enabled=false

# --- Razorpay disabled (webhook now fails CLOSED when the secret is blank) ---
razorpay.key-id=
razorpay.key-secret=
razorpay.webhook-secret=

# --- Redis (only needed for async segmentation queue). Defaults to localhost. ---
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Use a no-op cache in dev so a missing Redis doesn't break catalogue caching.
spring.cache.type=none
# Keep the signup rate limiter off in dev so a missing Redis doesn't add timeouts.
app.rate-limit.enabled=false

# --- Verification: senders disabled in dev → OTP codes are logged to the console ---
# Watch the backend log for lines like "[DEV EMAIL] ..." / "[DEV SMS] ..." to grab
# the 6-digit code while testing email + mobile verification with no SMTP/SMS set up.
app.mail.enabled=false
app.sms.enabled=false

# --- CORS: allow the Next.js dev server ---
app.cors.allowed-origins=http://localhost:3000
app.base-url=http://localhost:8080

# --- Logging ---
logging.level.com.gridstore.huevista=DEBUG
