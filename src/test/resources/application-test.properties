spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHk=
app.jwt.expiration-ms=900000
app.refresh-token.expiration-ms=604800000
app.claude.api-key=test-claude-api-key
app.upload.storage-path=/tmp/huevista/test-uploads
app.cors.allowed-origins=http://localhost:3000
razorpay.key-id=
razorpay.key-secret=
razorpay.webhook-secret=
replicate.api-token=
app.base-url=http://localhost:8080
# Disable Redis for tests — use NoOp cache
spring.cache.type=none
spring.data.redis.host=localhost
spring.data.redis.port=6379
# No Redis in tests — keep the signup rate limiter off so it never tries to connect.
app.rate-limit.enabled=false
# Don't bulk-load the bundled brand catalogues during tests — they assert exact shade counts.
app.catalog.auto-seed=false
